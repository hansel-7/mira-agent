name: Build Mira Portable EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pixel-cat

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pixel-cat/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        shell: pwsh
        run: |
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          npm run dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mira-portable-windows
          path: pixel-cat/dist/*-portable.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $artifact = Get-ChildItem dist\*-portable.exe | Select-Object -First 1
          if (-not $artifact) {
            throw "Portable EXE not found."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $artifact.FullName --clobber
          } else {
            gh release create $tag $artifact.FullName --title $tag --notes "Portable Windows build of Mira."
          }
