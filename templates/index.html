<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mira</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e8e8ed;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid #1e1e24;
      background: #0f0f11;
    }

    header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header span { font-size: 12px; color: #6b7280; margin-left: 4px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { flex-direction: row-reverse; }

    .message .bubble-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .message.assistant .bubble-avatar {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
    }

    .message.user .bubble-avatar {
      background: #1e1e24;
      color: #9ca3af;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      max-width: calc(100% - 52px);
      white-space: pre-wrap;
      word-break: break-word;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message.assistant .bubble {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: #6366f1;
      color: #fff;
      border-top-right-radius: 4px;
    }

    .bubble img {
      max-width: 280px;
      max-height: 280px;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }

    .cursor-blink::after {
      content: "▋";
      animation: blink 0.7s step-end infinite;
      color: #a855f7;
      margin-left: 1px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #input-area {
      padding: 16px;
      border-top: 1px solid #1e1e24;
      background: #0f0f11;
    }

    #input-wrap {
      display: flex;
      flex-direction: column;
      max-width: 780px;
      margin: 0 auto;
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    #input-wrap:focus-within { border-color: #6366f1; }

    #image-preview {
      display: none;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a35;
      margin-bottom: 8px;
    }

    #image-preview.visible { display: flex; }

    #image-preview img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
    }

    #image-preview-remove {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #3f3f4e;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }

    #image-preview-remove:hover { background: #ef4444; color: #fff; }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    #attach-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #2a2a35;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #attach-btn:hover { background: #3f3f4e; }
    #attach-btn svg { width: 18px; height: 18px; fill: #9ca3af; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8ed;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #4b5563; }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #6366f1;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }

    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>

<header>
  <div class="avatar">M</div>
  <div>
    <h1>Mira <span>powered by Gemma 4 31B</span></h1>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <div id="input-wrap">
    <div id="image-preview">
      <img id="image-preview-thumb" src="" alt="preview" />
      <button id="image-preview-remove" title="Remove image">✕</button>
    </div>
    <div id="input-row">
      <button id="attach-btn" title="Attach image">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <textarea id="user-input" rows="1" placeholder="Message Mira… (or paste an image)"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const attachBtn = document.getElementById("attach-btn");
  const fileInput = document.getElementById("file-input");
  const imagePreview = document.getElementById("image-preview");
  const imagePreviewThumb = document.getElementById("image-preview-thumb");
  const imagePreviewRemove = document.getElementById("image-preview-remove");

  const GREETING = "Hi. This is Mira. How are you feeling today?";

  let history = [{ role: "assistant", content: GREETING }];
  let isStreaming = false;
  let selectedImage = null; // { dataUrl: string }

  addMessage("assistant", GREETING);

  // — Image selection —

  attachBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
    fileInput.value = "";
  });

  document.addEventListener("paste", (e) => {
    const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith("image/"));
    if (item) loadImage(item.getAsFile());
  });

  imagePreviewRemove.addEventListener("click", clearImage);

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedImage = { dataUrl: e.target.result };
      imagePreviewThumb.src = e.target.result;
      imagePreview.classList.add("visible");
      inputEl.focus();
    };
    reader.readAsDataURL(file);
  }

  function clearImage() {
    selectedImage = null;
    imagePreviewThumb.src = "";
    imagePreview.classList.remove("visible");
  }

  // — Input auto-resize —

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  }

  inputEl.addEventListener("input", autoResize);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // — Render messages —

  function addMessage(role, text = "", imageDataUrl = null) {
    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const avatarEl = document.createElement("div");
    avatarEl.className = "bubble-avatar";
    avatarEl.textContent = role === "assistant" ? "M" : "U";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (imageDataUrl) {
      const img = document.createElement("img");
      img.src = imageDataUrl;
      img.alt = "attached image";
      bubble.appendChild(img);
    }

    const textNode = document.createElement("span");
    textNode.textContent = text;
    bubble.appendChild(textNode);

    msg.appendChild(avatarEl);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;

    return { bubble, textNode };
  }

  // — Send —

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text && !selectedImage || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;

    const capturedImage = selectedImage;
    inputEl.value = "";
    inputEl.style.height = "auto";
    clearImage();

    // Build message content for the LLM
    let userContent;
    if (capturedImage) {
      userContent = [
        { type: "image_url", image_url: { url: capturedImage.dataUrl } },
        { type: "text", text: text || "" },
      ];
    } else {
      userContent = text;
    }

    addMessage("user", text, capturedImage?.dataUrl);
    history.push({ role: "user", content: userContent });

    const { bubble, textNode } = addMessage("assistant");
    bubble.classList.add("cursor-blink");

    let reply = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") break;
          try {
            const { content } = JSON.parse(data);
            reply += content;
            textNode.textContent = reply;
            chatEl.scrollTop = chatEl.scrollHeight;
          } catch {}
        }
      }
    } catch {
      textNode.textContent = "Error: could not reach the server.";
    }

    bubble.classList.remove("cursor-blink");
    history.push({ role: "assistant", content: reply });

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
