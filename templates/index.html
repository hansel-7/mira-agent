<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mira</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fffdf5;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: #ffe500;
      border-bottom: 3px solid #000;
    }

    header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 16px;
      color: #ffe500;
      flex-shrink: 0;
      border: 2px solid #000;
    }

    header h1 {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      animation: popIn 0.15s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to   { opacity: 1; transform: none; }
    }

    .message.user { flex-direction: row-reverse; }

    .bubble-avatar {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      border: 2px solid #000;
    }

    .message.assistant .bubble-avatar {
      background: #ffe500;
      color: #000;
    }

    .message.user .bubble-avatar {
      background: #000;
      color: #ffe500;
    }

    .bubble {
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.6;
      max-width: calc(100% - 50px);
      white-space: pre-wrap;
      word-break: break-word;
      border: 2px solid #000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message.assistant .bubble {
      background: #fff;
      box-shadow: 4px 4px 0 #000;
      border-radius: 0 8px 8px 8px;
    }

    .message.user .bubble {
      background: #ffe500;
      box-shadow: -4px 4px 0 #000;
      border-radius: 8px 0 8px 8px;
    }

    .bubble img {
      max-width: 260px;
      max-height: 260px;
      object-fit: contain;
      display: block;
      border: 2px solid #000;
    }

    /* blinking cursor while streaming */
    .cursor-blink > span::after {
      content: "▋";
      animation: blink 0.7s step-end infinite;
      color: #000;
      margin-left: 2px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── Input area ── */
    #input-area {
      padding: 16px;
      border-top: 3px solid #000;
      background: #fffdf5;
    }

    #input-wrap {
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border: 2px solid #000;
      box-shadow: 4px 4px 0 #000;
    }

    #image-preview {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 2px solid #000;
      background: #fff8d6;
    }

    #image-preview.visible { display: flex; }

    #image-preview img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border: 2px solid #000;
    }

    #image-preview-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex: 1;
    }

    #image-preview-remove {
      width: 26px;
      height: 26px;
      background: #000;
      border: none;
      cursor: pointer;
      color: #ffe500;
      font-size: 14px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #image-preview-remove:hover { background: #c00; }

    #input-row {
      display: flex;
      align-items: flex-end;
    }

    #attach-btn {
      width: 48px;
      min-height: 48px;
      background: #fff;
      border: none;
      border-right: 2px solid #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    #attach-btn:hover { background: #fff8d6; }
    #attach-btn svg { width: 20px; height: 20px; fill: #000; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #000;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
      padding: 14px 12px;
      font-weight: 500;
    }

    #user-input::placeholder { color: #999; font-weight: 400; }

    #send-btn {
      width: 56px;
      min-height: 48px;
      background: #000;
      border: none;
      border-left: 2px solid #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }

    #send-btn:hover { background: #222; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; fill: #ffe500; }
    #send-btn:disabled svg { fill: #999; }
  </style>
</head>
<body>

<header>
  <div class="avatar">M</div>
  <div>
    <h1>Mira <span>Gemma 4 31B</span></h1>
  </div>
</header>

<div id="chat"></div>

<div id="input-area">
  <div id="input-wrap">
    <div id="image-preview">
      <img id="image-preview-thumb" src="" alt="preview" />
      <span id="image-preview-label">Image attached</span>
      <button id="image-preview-remove" title="Remove">✕</button>
    </div>
    <div id="input-row">
      <button id="attach-btn" title="Attach image">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </button>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <textarea id="user-input" rows="1" placeholder="Message Mira… (or paste an image)"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const chatEl   = document.getElementById("chat");
  const inputEl  = document.getElementById("user-input");
  const sendBtn  = document.getElementById("send-btn");
  const attachBtn = document.getElementById("attach-btn");
  const fileInput = document.getElementById("file-input");
  const imagePreview      = document.getElementById("image-preview");
  const imagePreviewThumb = document.getElementById("image-preview-thumb");
  const imagePreviewRemove = document.getElementById("image-preview-remove");

  const GREETING = "Hi. This is Mira. How are you feeling today?";

  let history = [{ role: "assistant", content: GREETING }];
  let isStreaming = false;
  let selectedImage = null;

  addMessage("assistant", GREETING);

  // ── Image handling ──

  attachBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) loadImage(fileInput.files[0]);
    fileInput.value = "";
  });

  document.addEventListener("paste", (e) => {
    const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith("image/"));
    if (item) loadImage(item.getAsFile());
  });

  imagePreviewRemove.addEventListener("click", clearImage);

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedImage = { dataUrl: e.target.result };
      imagePreviewThumb.src = e.target.result;
      imagePreview.classList.add("visible");
      inputEl.focus();
    };
    reader.readAsDataURL(file);
  }

  function clearImage() {
    selectedImage = null;
    imagePreviewThumb.src = "";
    imagePreview.classList.remove("visible");
  }

  // ── Input resize ──

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  }

  inputEl.addEventListener("input", autoResize);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // ── Render messages ──

  function addMessage(role, text = "", imageDataUrl = null) {
    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const avatarEl = document.createElement("div");
    avatarEl.className = "bubble-avatar";
    avatarEl.textContent = role === "assistant" ? "M" : "U";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (imageDataUrl) {
      const img = document.createElement("img");
      img.src = imageDataUrl;
      img.alt = "attached image";
      bubble.appendChild(img);
    }

    const textNode = document.createElement("span");
    textNode.textContent = text;
    bubble.appendChild(textNode);

    msg.appendChild(avatarEl);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;

    return { bubble, textNode };
  }

  // ── Send ──

  async function sendMessage() {
    const text = inputEl.value.trim();
    if ((!text && !selectedImage) || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;

    const capturedImage = selectedImage;
    inputEl.value = "";
    inputEl.style.height = "auto";
    clearImage();

    let userContent;
    if (capturedImage) {
      userContent = [
        { type: "image_url", image_url: { url: capturedImage.dataUrl } },
        { type: "text", text: text || "" },
      ];
    } else {
      userContent = text;
    }

    addMessage("user", text, capturedImage?.dataUrl);
    history.push({ role: "user", content: userContent });

    const { bubble, textNode } = addMessage("assistant");
    bubble.classList.add("cursor-blink");

    let reply = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") break;
          try {
            const { content } = JSON.parse(data);
            reply += content;
            textNode.textContent = reply;
            chatEl.scrollTop = chatEl.scrollHeight;
          } catch {}
        }
      }
    } catch {
      textNode.textContent = "Error: could not reach the server.";
    }

    bubble.classList.remove("cursor-blink");
    history.push({ role: "assistant", content: reply });

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
