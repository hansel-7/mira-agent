<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mira</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e8e8ed;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid #1e1e24;
      background: #0f0f11;
    }

    header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header span { font-size: 12px; color: #6b7280; margin-left: 4px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { flex-direction: row-reverse; }

    .message .bubble-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .message.assistant .bubble-avatar {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
    }

    .message.user .bubble-avatar {
      background: #1e1e24;
      color: #9ca3af;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      max-width: calc(100% - 52px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: #6366f1;
      color: #fff;
      border-top-right-radius: 4px;
    }

    .cursor-blink::after {
      content: "▋";
      animation: blink 0.7s step-end infinite;
      color: #a855f7;
      margin-left: 1px;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #input-area {
      padding: 16px;
      border-top: 1px solid #1e1e24;
      background: #0f0f11;
    }

    #input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 780px;
      margin: 0 auto;
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    #input-wrap:focus-within { border-color: #6366f1; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8ed;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #4b5563; }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #6366f1;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }

    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; fill: #fff; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #4b5563;
      pointer-events: none;
    }

    #empty-state .big-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    #empty-state p { font-size: 15px; }
  </style>
</head>
<body>

<header>
  <div class="avatar">M</div>
  <div>
    <h1>Mira <span>powered by Gemma 4 31B</span></h1>
  </div>
</header>

<div id="chat">
  <div id="empty-state">
    <div class="big-avatar">M</div>
    <p>Send a message to start chatting</p>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Message Mira…"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const chatEl = document.getElementById("chat");
  const emptyState = document.getElementById("empty-state");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  let history = [];
  let isStreaming = false;

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
  }

  inputEl.addEventListener("input", autoResize);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  function addMessage(role, content = "") {
    if (emptyState) emptyState.style.display = "none";

    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const avatarEl = document.createElement("div");
    avatarEl.className = "bubble-avatar";
    avatarEl.textContent = role === "assistant" ? "M" : "U";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    msg.appendChild(avatarEl);
    msg.appendChild(bubble);
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;

    return bubble;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    addMessage("user", text);
    history.push({ role: "user", content: text });

    const bubble = addMessage("assistant");
    bubble.classList.add("cursor-blink");

    let reply = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6).trim();
          if (data === "[DONE]") break;
          try {
            const { content } = JSON.parse(data);
            reply += content;
            bubble.textContent = reply;
            chatEl.scrollTop = chatEl.scrollHeight;
          } catch {}
        }
      }
    } catch (err) {
      bubble.textContent = "Error: could not reach the server.";
    }

    bubble.classList.remove("cursor-blink");
    history.push({ role: "assistant", content: reply });

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
