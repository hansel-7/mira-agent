<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { --ink: #0a0a0a; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 18px; background: #f4f4f4; color: var(--ink);
      font-family: 'Courier New', monospace; font-size: 14px;
    }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .preview {
      height: 94px; border: 3px solid var(--ink); background: #000;
      box-shadow: 3px 3px 0 rgba(0,0,0,.35); margin-bottom: 18px;
    }
    .row { display: grid; grid-template-columns: 24px 1fr 72px; align-items: center; gap: 10px; margin: 14px 0; }
    label { font-weight: bold; }
    input[type=range] { width: 100%; accent-color: var(--ink); }
    input[type=number], input[type=text] {
      width: 100%; font-family: inherit; font-size: 14px; padding: 7px 8px;
      border: 3px solid var(--ink); background: #fff; outline: none;
    }
    input:focus { box-shadow: 3px 3px 0 rgba(0,0,0,.4); }
    .hex { display: grid; grid-template-columns: 42px 1fr; align-items: center; gap: 10px; margin-top: 18px; }
    .actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
    button {
      font-family: inherit; font-size: 14px; font-weight: bold; padding: 8px 14px;
      border: 3px solid var(--ink); background: #fff; cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,.4);
    }
    button.primary { background: var(--ink); color: #fff; }
    button:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,.4); }
  </style>
</head>
<body>
  <h1>Cat color</h1>
  <div id="preview" class="preview"></div>

  <div class="row">
    <label for="r">R</label>
    <input id="r" type="range" min="0" max="255" value="0" />
    <input id="rn" type="number" min="0" max="255" value="0" />
  </div>
  <div class="row">
    <label for="g">G</label>
    <input id="g" type="range" min="0" max="255" value="0" />
    <input id="gn" type="number" min="0" max="255" value="0" />
  </div>
  <div class="row">
    <label for="b">B</label>
    <input id="b" type="range" min="0" max="255" value="0" />
    <input id="bn" type="number" min="0" max="255" value="0" />
  </div>

  <div class="hex">
    <label for="hex">HEX</label>
    <input id="hex" type="text" maxlength="7" value="#000000" />
  </div>

  <div class="actions">
    <button id="reset">Classic black</button>
    <div>
      <button id="close">Close</button>
      <button id="apply" class="primary">Apply</button>
    </div>
  </div>

  <script>
  (() => {
    const api = window.api;
    const ids = ['r', 'g', 'b'];
    const el = (id) => document.getElementById(id);
    const clamp = (v) => Math.max(0, Math.min(255, Number.parseInt(v, 10) || 0));
    const hex2 = (v) => clamp(v).toString(16).padStart(2, '0');
    const toHex = () => '#' + hex2(el('r').value) + hex2(el('g').value) + hex2(el('b').value);

    function setRgb(r, g, b, applyLive = true) {
      const vals = { r: clamp(r), g: clamp(g), b: clamp(b) };
      for (const id of ids) {
        el(id).value = vals[id];
        el(id + 'n').value = vals[id];
      }
      const color = toHex();
      el('hex').value = color;
      el('preview').style.background = color;
      if (applyLive) api.setCatColor(color);
    }
    function setHex(value, applyLive = true) {
      const raw = String(value || '').trim();
      if (!/^#[0-9a-f]{6}$/i.test(raw)) return;
      setRgb(parseInt(raw.slice(1, 3), 16), parseInt(raw.slice(3, 5), 16), parseInt(raw.slice(5, 7), 16), applyLive);
    }

    for (const id of ids) {
      el(id).addEventListener('input', () => setRgb(el('r').value, el('g').value, el('b').value));
      el(id + 'n').addEventListener('input', () => setRgb(el('rn').value, el('gn').value, el('bn').value));
    }
    el('hex').addEventListener('input', () => setHex(el('hex').value));
    el('reset').addEventListener('click', () => setRgb(0, 0, 0));
    el('apply').addEventListener('click', () => api.setCatColor(toHex()));
    el('close').addEventListener('click', () => api.close());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') api.close();
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) api.setCatColor(toHex());
    });

    api.getCatColor().then((color) => setHex(color || '#000000', false));
  })();
  </script>
</body>
</html>
