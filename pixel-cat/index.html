<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #cat {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      image-rendering: pixelated;
      user-select: none;
      cursor: grab;
    }
    #bubble {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 94%);
      box-sizing: border-box;
      background: #0a0a0a;
      border: 3px solid #fff;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.35;
      display: none;
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.45);
    }
    /* inner element scrolls; outer keeps the border + speech tail unclipped */
    #bubbleText {
      max-height: 220px;
      overflow-y: auto;
      padding: 10px 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #bubble::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -12px;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #fff;
    }
    #inputWrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 94%);
      display: none;
    }
    #chat {
      width: 100%;
      box-sizing: border-box;
      background: #0a0a0a;
      border: 3px solid #fff;
      color: #fff;
      padding: 9px 12px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: bold;
      outline: none;
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.45);
    }
    #chat::placeholder { color: #888; }
  </style>
</head>
<body>
  <div id="bubble"><div id="bubbleText"></div></div>
  <canvas id="cat"></canvas>
  <div id="inputWrap"><input id="chat" placeholder="Say something to Mira..." /></div>
  <script>
    const SPRITE = 80;

    const canvas = document.getElementById('cat');
    const ctx = canvas.getContext('2d');
    const bubble = document.getElementById('bubble');
    const bubbleText = document.getElementById('bubbleText');
    const inputWrap = document.getElementById('inputWrap');
    const chat = document.getElementById('chat');

    const buf = document.createElement('canvas');
    buf.width = SPRITE;
    buf.height = SPRITE;
    const bctx = buf.getContext('2d');

    const baseImg = new Image();
    baseImg.src = 'assets/mira_base.png';
    const rigImg = new Image();
    rigImg.src = 'assets/mira_rig.png';
    const yapImg = new Image(); // 2 frames of 320x320: closed / pop
    yapImg.src = 'assets/mira_yapping.png';
    const typImg = new Image(); // 2 frames of 80x80: typing at the keyboard
    typImg.src = 'assets/mira_typing_80x80.png';

    let meta = null;
    fetch('assets/rig-meta.json')
      .then((r) => r.json())
      .then((m) => {
        meta = m;
        for (const [name, r] of Object.entries(m.regions)) state[name] = r.neutral;
      });

    // ---------- layout (window = bubble area + cat + input area) ----------
    let curLayout = { scale: 3, bubbleH: 270, inputH: 56 };
    let pomoActive = false;   // pomodoro timer is shown above Mira's head
    const CLOCK_CLEAR = 66;   // px to lift the bubble so it clears that timer
    function bubbleBottomPx() {
      return window.innerHeight - curLayout.bubbleH + 12 + (pomoActive ? CLOCK_CLEAR : 0);
    }
    function applyLayout(l) {
      curLayout = l;
      const size = SPRITE * l.scale;
      canvas.width = size;
      canvas.height = size;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      canvas.style.top = l.bubbleH + 'px';
      bubble.style.bottom = bubbleBottomPx() + 'px';
      inputWrap.style.top = (l.bubbleH + size + 8) + 'px';
      ctx.imageSmoothingEnabled = false;
    }
    window.catAPI.onLayout(applyLayout);
    applyLayout({ scale: 3, bubbleH: 270, inputH: 56 });
    window.catAPI.onPomoActive((v) => {
      pomoActive = v;
      bubble.style.bottom = bubbleBottomPx() + 'px';
    });

    // ---------- layer states (populated from rig-meta neutrals once it loads) ----------
    const state = {};
    let blinking = false;
    let speaking = false;

    function rand(a, b) { return a + Math.random() * (b - a); }

    function scheduleEar(name) {
      setTimeout(() => {
        state[name] = Math.random() < 0.5 ? 0 : 2;
        setTimeout(() => {
          state[name] = 1;
          scheduleEar(name);
        }, 150);
      }, rand(3000, 9000));
    }
    scheduleEar('earL');
    scheduleEar('earR');

    (function tailSway() {
      const seq = [0, 1, 2, 1];
      let i = 0;
      (function step() {
        setTimeout(() => {
          i = (i + 1) % seq.length;
          state.tail = seq[i];
          step();
        }, rand(500, 900));
      })();
    })();

    function scheduleWhisk(name) {
      setTimeout(() => {
        state[name] = Math.floor(Math.random() * 3);
        scheduleWhisk(name);
      }, rand(2500, 6000));
    }
    scheduleWhisk('whiskL');
    scheduleWhisk('whiskR');

    (function scheduleBlink() {
      setTimeout(() => {
        blinking = true;
        setTimeout(() => {
          blinking = false;
          scheduleBlink();
        }, 150);
      }, rand(2500, 6000));
    })();

    // popcat loop while speaking: closed face ↔ giant gape
    let pop = false;
    let holdPop = false; // freeze on the closed-mouth frame after the text finishes
    (function mouthLoop() {
      setInterval(() => {
        pop = speaking ? (!holdPop && !pop) : false;
      }, 170);
    })();

    // ---------- typing reaction (global keystrokes) ----------
    let typFrame = 0;
    let typingUntil = 0;
    window.catAPI.onKey(() => {
      typFrame = 1 - typFrame; // each stroke alternates the paws
      typingUntil = performance.now() + 450;
      heat = Math.min(1, heat + HEAT_GAIN); // each stroke stokes the overheat
    });

    // ---------- overheat: fast typing gradually reddens the cat ----------
    // heat 0..1 climbs HEAT_GAIN per keystroke, cools HEAT_COOL/sec while idle,
    // so it only reaches red under sustained fast typing (~HEAT_COOL/HEAT_GAIN keys/sec).
    const HEAT_GAIN = 0.075;
    const HEAT_COOL = 0.70;
    const HEAT_MAX_ALPHA = 0.8; // red overlay opacity at full heat
    let heat = 0;
    let lastT = performance.now();

    function applyHeatTint() {
      if (heat <= 0.001) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop'; // only paints over the cat, not the transparent bg
      ctx.fillStyle = 'rgba(230, 40, 30, ' + (heat * HEAT_MAX_ALPHA).toFixed(3) + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    // ---------- cursor: eyes + body lean ----------
    let cursor = { x: 0, y: 0 };
    window.catAPI.onCursor((p) => (cursor = p));

    const pupil = { x: 0, y: 0 };
    let lean = 0;

    function tick() {
      const t = meta.pupilTravel; // only called once meta is loaded
      const dist = Math.hypot(cursor.x, cursor.y);
      const onCat = dist < canvas.width * 0.55;
      const tx = onCat ? 0 : (cursor.x / dist) * (t + 0.4);
      const ty = onCat ? 0 : (cursor.y / dist) * (t + 0.4);
      const leanTarget = onCat ? 0 : Math.sign(cursor.x) * 2;
      pupil.x += (tx - pupil.x) * 0.2;
      pupil.y += (ty - pupil.y) * 0.2;
      lean += (leanTarget - lean) * 0.08;
    }

    function drawRegion(name, vi) {
      const r = meta.regions[name];
      bctx.clearRect(r.x, r.y, r.w, r.h);
      bctx.drawImage(rigImg, r.sx[vi], 0, r.w, r.h, r.x, r.y, r.w, r.h);
    }

    function drawPupils() {
      const t = meta.pupilTravel;
      let dx = Math.max(-t, Math.min(t, Math.round(pupil.x / 2) * 2));
      let dy = Math.max(-t, Math.min(t, Math.round(pupil.y / 2) * 2));
      bctx.fillStyle = '#000';
      for (const key of ['left', 'right']) {
        const p = meta.eyes[key].pupil;
        const x = p.x + dx;
        const y = p.y + dy;
        bctx.fillRect(x, y + 1, p.w, p.h - 2);
        bctx.fillRect(x + 1, y, p.w - 2, 1);
        bctx.fillRect(x + 1, y + p.h - 1, p.w - 2, 1);
      }
    }

    function draw() {
      requestAnimationFrame(draw);
      const now = performance.now();
      const dt = Math.min(0.1, (now - lastT) / 1000); // clamp to avoid a jump after a stall
      lastT = now;
      if (heat > 0) heat = Math.max(0, heat - dt * HEAT_COOL);

      if (speaking && yapImg.complete) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(yapImg, pop ? 320 : 0, 0, 320, 320, 0, 0, canvas.width, canvas.height);
        applyHeatTint();
        return;
      }
      if (typingUntil > now && typImg.complete) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(typImg, typFrame * 80, 0, 80, 80, 0, 0, canvas.width, canvas.height);
        applyHeatTint();
        return;
      }
      if (!meta || !baseImg.complete || !rigImg.complete) return;
      tick();

      bctx.clearRect(0, 0, SPRITE, SPRITE);
      bctx.drawImage(baseImg, 0, 0);
      for (const name of ['earL', 'earR', 'tail', 'whiskL', 'whiskR', 'mouth']) {
        drawRegion(name, state[name]);
      }
      if (blinking) {
        drawRegion('blink', 0);
      } else {
        drawPupils();
      }

      const k = canvas.width / SPRITE;
      const split = meta.leanSplit;
      const leanPx = Math.round(lean / 2) * 2 * k;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(buf, 0, 0, SPRITE, split, leanPx, 0, canvas.width, split * k);
      ctx.drawImage(buf, 0, split, SPRITE, SPRITE - split, 0, split * k, canvas.width, (SPRITE - split) * k);
      applyHeatTint();
    }
    draw();

    // ---------- chat ----------
    let chatOpen = false;
    let holdTimer = null;

    function openChat() {
      chatOpen = true;
      inputWrap.style.display = 'block';
      window.catAPI.setIgnore(false);
      chat.focus();
    }
    function closeChat() {
      if (onboarding || intro) return; // don't let the first-run flow be dismissed
      chatOpen = false;
      inputWrap.style.display = 'none';
      chat.value = '';
      bubble.style.display = 'none';
    }

    // ---------- agent chat (streamed from main over IPC) ----------
    const history = [];
    let reqId = 0;
    let target = '';      // visible text typed into the bubble
    let raw = '';         // full streamed reply (may carry a hidden [[REMINDER]] block)
    let printed = 0;      // chars typed into the bubble
    let streamDone = false;
    let printTimer = null;

    // yapNow=false: show the "…" bubble but stay idle until text starts arriving
    // (so she doesn't yap through the wait for the first token); yapNow=true: yap now (local lines)
    function startSpeaking(yapNow) {
      clearTimeout(holdTimer);
      clearTimeout(printTimer);
      holdPop = false;
      target = '';
      raw = '';
      printed = 0;
      streamDone = false;
      bubbleText.textContent = '...';
      bubble.style.display = 'block';
      speaking = !!yapNow;
      printLoop();
    }

    function printLoop() {
      if (printed < target.length) {
        if (printed === 0) bubbleText.textContent = '';
        // type faster the further behind we are, so long replies don't yap forever
        const backlog = target.length - printed;
        const step = Math.max(1, Math.ceil(backlog / 45));
        bubbleText.textContent += target.slice(printed, printed + step);
        printed += step;
        bubbleText.scrollTop = bubbleText.scrollHeight; // follow the latest text
        printTimer = setTimeout(printLoop, 35);
      } else if (streamDone) {
        finishSpeaking();
      } else {
        printTimer = setTimeout(printLoop, 80); // caught up — wait for the stream
      }
    }

    function finishSpeaking() {
      // hold the closed-mouth frame for a beat, then settle back to idle;
      // the bubble stays up until the chat is closed
      holdPop = true;
      pop = false;
      holdTimer = setTimeout(() => {
        speaking = false;
        holdPop = false;
      }, 2000);
    }

    // show a local line (onboarding questions, etc.) using the same yap + typewriter
    function say(text) {
      startSpeaking(true); // local text is ready now, so yap immediately
      target = text;
      streamDone = true;
    }

    // reminders firing / pomodoro phase changes: Mira pops a bubble, auto-hides if idle
    let notifyHideTimer = null;
    window.catAPI.onNotify((text) => {
      say(text);
      clearTimeout(notifyHideTimer);
      notifyHideTimer = setTimeout(() => { if (!chatOpen) bubble.style.display = 'none'; }, 12000);
    });

    // ---- parse optional action blocks the agent may append (reminders, tasks) ----
    function createReminderFromChat(j) {
      const task = String(j.task || '').trim().slice(0, 200);
      const deadline = new Date(j.datetime).getTime();
      const repeat = ['once', 'daily', 'weekly'].includes(j.repeat) ? j.repeat : 'once';
      let remindBefore = Number(j.remindBefore);
      if (!Number.isFinite(remindBefore) || remindBefore < 0) remindBefore = 15;
      if (!task || !deadline || Number.isNaN(deadline) || deadline <= Date.now()) return;
      window.catAPI.addReminder({ task, deadline, remindBefore, repeat });
    }
    function createTaskFromChat(j) {
      const title = String(j.title || '').trim().slice(0, 200);
      if (!title) return;
      let deadline = null;
      if (j.deadline) { const t = new Date(j.deadline).getTime(); if (Number.isFinite(t)) deadline = t; }
      const subtasks = Array.isArray(j.subtasks)
        ? j.subtasks.map((s) => String(s).trim()).filter(Boolean).slice(0, 30)
        : [];
      window.catAPI.createTask({ title, deadline, subtasks });
    }
    const MARKERS = [
      { open: '[[REMINDER]]', close: '[[/REMINDER]]', run: createReminderFromChat },
      { open: '[[TASK]]', close: '[[/TASK]]', run: createTaskFromChat },
    ];
    function firstMarker(s) {
      let idx = -1;
      for (const m of MARKERS) {
        const i = s.indexOf(m.open);
        if (i !== -1 && (idx === -1 || i < idx)) idx = i;
      }
      return idx;
    }
    // text safe to show mid-stream: before the first marker, holding back a trailing
    // partial of any marker so "[[TAS…" never flashes in the bubble
    function visibleSoFar(s) {
      const i = firstMarker(s);
      if (i !== -1) return s.slice(0, i);
      let cut = s.length;
      for (const m of MARKERS) {
        for (let n = Math.min(m.open.length - 1, s.length); n > 0; n--) {
          if (s.endsWith(m.open.slice(0, n))) { cut = Math.min(cut, s.length - n); break; }
        }
      }
      return s.slice(0, cut);
    }
    function runMarkers(s) {
      for (const m of MARKERS) {
        let from = 0, o;
        while ((o = s.indexOf(m.open, from)) !== -1) {
          const c = s.indexOf(m.close, o);
          const inner = c === -1 ? s.slice(o + m.open.length) : s.slice(o + m.open.length, c);
          try { m.run(JSON.parse(inner.trim())); } catch (e) { /* ignore malformed block */ }
          from = c === -1 ? s.length : c + m.close.length;
        }
      }
    }

    window.catAPI.onChatChunk((d) => {
      if (d.id !== reqId) return; // chunk from an aborted request
      if (d.error) {
        raw += (raw ? '\n' : '') + "Mrrp?! (can't reach my brain: " + d.error + ')';
        target = raw;
        streamDone = true;
        speaking = true; // yap out the error line
        return;
      }
      if (d.content) {
        raw += d.content;
        target = visibleSoFar(raw); // keep any action block out of the bubble while streaming
        speaking = true; // first token arrived -> start yapping now
      }
      if (d.done) {
        streamDone = true;
        const i = firstMarker(raw);
        target = (i === -1 ? raw : raw.slice(0, i)).trimEnd();
        history.push({ role: 'assistant', content: target });
        runMarkers(raw);
      }
    });

    // ---------- first-run onboarding (scripted Q&A -> profile.json) ----------
    const QUESTIONS = [
      { key: 'name', text: () => "Hi! I'm Mira ✨ What should I call you?" },
      { key: 'department', text: (a) => `Nice to meet you, ${a.name}! Which team or department are you on?` },
      { key: 'hobbies', text: () => "What do you like doing for fun?" },
      { key: 'behavior', text: () => "Last one — how should I talk to you? (e.g. concise, playful, formal)" },
    ];
    let onboarding = false;
    let obStep = 0;
    const answers = {};

    function startOnboarding() {
      onboarding = true;
      obStep = 0;
      chat.placeholder = 'Type your answer…';
      openChat();
      say(QUESTIONS[0].text(answers));
    }
    function handleAnswer(ans) {
      answers[QUESTIONS[obStep].key] = ans;
      obStep++;
      if (obStep < QUESTIONS.length) {
        say(QUESTIONS[obStep].text(answers));
      } else {
        onboarding = false;
        window.catAPI.saveProfile({ ...answers });
        startIntro(); // roll into the feature tour
      }
    }

    // ---------- first-run feature tour (after onboarding) ----------
    const INTRO = [
      "Click me anytime to chat — I'm hooked up to a real AI 🧠",
      "Right-click me for the menu: reminders, a Pomodoro timer, profile, and clock colour.",
      "Reminders can be one-off, daily, or weekly — open Reminders… to add or delete them.",
      "Start a Pomodoro and a little timer sits beside me, tracking your focus and breaks.",
      "Drag me around, scroll on me to resize, and double-click to quit.",
      "Type fast anywhere and I'll heat up 🔥 — try it sometime!",
    ];
    let intro = false;
    let introStep = 0;

    function startIntro() {
      intro = true;
      introStep = 0;
      chat.readOnly = true;
      chat.placeholder = 'Press Enter or click me to continue… (Esc skips)';
      openChat();
      say(`Got it, ${answers.name}! ✨ Quick tour of what I can do — Enter to flip through.`);
    }
    function advanceIntro() {
      if (introStep < INTRO.length) {
        say(INTRO[introStep]);
        introStep++;
      } else {
        endIntro();
      }
    }
    function endIntro() {
      intro = false;
      chat.readOnly = false;
      chat.value = '';
      chat.placeholder = 'Say something to Mira…';
      say(`That's the tour — ask me anything, ${answers.name}! 🐾`);
    }

    chat.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (intro) { endIntro(); return; } // Esc skips the tour
        closeChat();
        return;
      }
      if (e.key === 'Enter') {
        if (intro) { e.preventDefault(); advanceIntro(); return; }
        if (!chat.value.trim()) return;
        const q = chat.value.trim();
        chat.value = '';
        if (onboarding) { handleAnswer(q); return; }
        history.push({ role: 'user', content: q });
        if (history.length > 30) history.splice(0, history.length - 30);
        startSpeaking();
        window.catAPI.chatSend({ id: ++reqId, history });
      }
    });
    window.addEventListener('blur', () => {
      // only dismiss an idle input on blur — never a pending or visible reply bubble
      if (chatOpen && bubble.style.display === 'none') closeChat();
    });

    // on first launch (no saved profile) kick off onboarding
    window.catAPI.getProfile().then((p) => {
      if (!p) startOnboarding();
    });

    // ---------- click-through management ----------
    // window is click-through except over the cat, the input, or the bubble
    let ignoring = true;
    function rectOf(el) { return el.getBoundingClientRect(); }
    function pointIn(x, y, r) { return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom; }
    window.addEventListener('mousemove', (e) => {
      let over = pointIn(e.clientX, e.clientY, rectOf(canvas));
      if (chatOpen) over = over || pointIn(e.clientX, e.clientY, rectOf(inputWrap));
      if (bubble.style.display !== 'none') over = over || pointIn(e.clientX, e.clientY, rectOf(bubble));
      if (over === ignoring) {
        ignoring = !over;
        window.catAPI.setIgnore(ignoring);
      }
    });

    // ---------- cat interactions ----------
    let down = false;
    let moved = false;
    canvas.addEventListener('mousedown', () => {
      down = true;
      moved = false;
      window.catAPI.dragStart();
    });
    window.addEventListener('mousemove', () => {
      if (!down) return;
      moved = true;
      window.catAPI.dragMove();
    });
    window.addEventListener('mouseup', () => {
      down = false;
      window.catAPI.dragEnd();
    });
    canvas.addEventListener('click', () => {
      if (moved) return;
      if (intro) { advanceIntro(); return; }
      chatOpen ? closeChat() : openChat();
    });
    canvas.addEventListener('dblclick', () => window.catAPI.quit());
    canvas.addEventListener('wheel', (e) => {
      window.catAPI.resize(e.deltaY < 0 ? 1 : -1);
    });
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      window.catAPI.showMenu();
    });
  </script>
</body>
</html>
